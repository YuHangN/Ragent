server:
  port: 9090
  base-path: /api/ragent

db:
  dsn: ""  # 通过环境变量 RAGENT_DB_DSN 注入
  max-open-conns: 10
  max-idle-conns: 5
  conn-max-lifetime: 1800

redis:
  addr: "127.0.0.1:6379"
  password: ""  # 通过环境变量 RAGENT_REDIS_PASSWORD 注入
  db: 0

milvus:
  uri: "http://localhost:19530"

rustfs:
  endpoint: "localhost:9000"
  access-key: ""  # 通过环境变量 RAGENT_RUSTFS_ACCESS_KEY 注入
  secret-key: ""  # 通过环境变量 RAGENT_RUSTFS_SECRET_KEY 注入
  bucket: "ragent"
  use-ssl: false

app:
  demo-mode: false
  jwt-secret: "ragent-secret-change-in-production"
  jwt-expire-hours: 72

ai:
  providers:
    # OpenAI — chat + embedding（海外通用首选）
    openai:
      url: "https://api.openai.com"
      api-key: ""    # 通过环境变量 RAGENT_AI_PROVIDERS_OPENAI_API_KEY 覆盖
      endpoints:
        chat: "/v1/chat/completions"
        embedding: "/v1/embeddings"
    # Cohere — 业界最广泛使用的专用 rerank 服务
    cohere:
      url: "https://api.cohere.com"
      api-key: ""    # 通过环境变量 RAGENT_AI_PROVIDERS_COHERE_API_KEY 覆盖
      endpoints:
        rerank: "/v1/rerank"
    # Ollama — 本地运行开源模型（无需 API Key，开发/离线场景）
    ollama:
      url: "http://localhost:11434"
      endpoints:
        chat: "/v1/chat/completions"       # OpenAI 兼容端点
        embedding: "/v1/embeddings"        # OpenAI 兼容端点

  selection:
    failure-threshold: 3
    open-duration-ms: 30000

  chat:
    default-model: "gpt-4o-mini"
    candidates:
      - id: "gpt-4o-mini"
        provider: "openai"
        model: "gpt-4o-mini"
        priority: 1
      - id: "ollama-llama3"
        provider: "ollama"
        model: "llama3.1:8b"
        priority: 5

  embedding:
    # OpenAI text-embedding-3-small（cloud 默认）+ Ollama bge-m3（本地兜底）
    # 都设 dimension=1024，OpenAI 通过 dimensions 参数截断，Ollama bge-m3 原生即 1024 维，
    # 与 Phase 3 Milvus collection 维度对齐，无需改向量库 schema
    default-model: "text-embedding-3-small"
    candidates:
      - id: "text-embedding-3-small"
        provider: "openai"
        model: "text-embedding-3-small"
        dimension: 1024
        priority: 1
      - id: "ollama-bge-m3"
        provider: "ollama"
        model: "bge-m3"
        dimension: 1024
        priority: 5

  rerank:
    # Cohere rerank-multilingual-v3.0 — 支持 100+ 语言，使用最广泛的专用 reranker
    default-model: "rerank-multilingual-v3"
    candidates:
      - id: "rerank-multilingual-v3"
        provider: "cohere"
        model: "rerank-multilingual-v3.0"
        priority: 1

rag:
  knowledge:
    schedule:
      scan-delay-ms: 10000
      lock-seconds: 900
      batch-size: 20
      max-file-size-bytes: 104857600

ingestion:
  tika:
    url: "http://localhost:9998/tika"
    timeout-seconds: 60
  feishu:
    app-id: ""
    app-secret: ""
  http:
    timeout-seconds: 30
    max-body-mb: 50
  local:
    allowed-roots:
      - "/tmp/ragent-uploads"
