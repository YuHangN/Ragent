services:
  mysql:
    image: mysql:8.0
    container_name: ragent-mysql
    env_file: ../.env
    environment:
      MYSQL_DATABASE: ragent
    ports:
      - "3306:3306"
    volumes:
      - ragent-mysql-data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: ragent-redis
    env_file: ../.env
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - ragent-redis-data:/data

  tika:
    image: apache/tika:latest-full
    container_name: ragent-tika
    ports:
      - "9998:9998"
    restart: unless-stopped

volumes:
  ragent-mysql-data:
  ragent-redis-data:
