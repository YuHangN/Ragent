<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ragent · 主页</title>
  <link rel="stylesheet" href="/ui/css/style.css" />
</head>
<body>
  <div class="topbar">
    <div class="brand">Ragent</div>
    <nav>
      <a href="/ui/index.html">主页</a>
      <a href="/ui/chat.html">聊天</a>
    </nav>
    <div class="user">
      <span id="userBadge"></span>
      <button class="ghost" id="logoutBtn">登出</button>
    </div>
  </div>

  <div class="container">
    <div class="card">
      <h1>知识库</h1>
      <div class="row" style="margin-bottom:12px">
        <input id="kbSelect" disabled placeholder="加载中..." />
        <input id="newKbName" placeholder="新建知识库名称" class="shrink" style="flex:0 0 220px" />
        <button class="shrink" id="createKbBtn">新建</button>
      </div>
      <div class="muted" id="kbInfo"></div>
      <div class="error" id="kbErr"></div>
    </div>

    <div class="card">
      <h2>上传文档</h2>
      <div class="row" style="margin-bottom:12px">
        <input type="file" id="fileInput" />
        <button class="shrink" id="uploadBtn">上传并切分</button>
      </div>
      <div class="muted">默认 processMode=chunk（上传后自动触发 ingestion pipeline）</div>
      <div class="error" id="uploadErr"></div>
    </div>

    <div class="card">
      <h2>文档列表</h2>
      <div class="row" style="margin-bottom:12px;justify-content:flex-end">
        <button class="ghost shrink" id="refreshDocsBtn">刷新</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>文件名</th>
            <th>状态</th>
            <th>分块数</th>
            <th>大小</th>
            <th>更新时间</th>
          </tr>
        </thead>
        <tbody id="docsTbody">
          <tr><td colspan="5" class="muted">尚未选择知识库</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script type="module">
    import { apiGet, apiPost, apiUpload, requireAuth, getUser, clearAuth } from "/ui/js/api.js";

    requireAuth();

    const $ = (id) => document.getElementById(id);
    const u = getUser();
    if (u) $("userBadge").textContent = `${u.username || u.userId} (${u.role || "user"})`;
    $("logoutBtn").addEventListener("click", () => {
      clearAuth();
      location.href = "/ui/login.html";
    });

    let kbList = [];
    let currentKbID = localStorage.getItem("ragent_kb_id") || "";

    async function loadKBs() {
      const data = await apiGet("/knowledge-base", { current: 1, size: 100 });
      kbList = data.records || [];
      renderKBs();
    }

    function renderKBs() {
      const sel = $("kbSelect");
      // input → 改成 select
      const select = document.createElement("select");
      select.id = "kbSelect";
      if (kbList.length === 0) {
        const opt = document.createElement("option");
        opt.textContent = "暂无知识库，先新建一个";
        opt.disabled = true;
        opt.selected = true;
        select.appendChild(opt);
      } else {
        kbList.forEach((kb) => {
          const opt = document.createElement("option");
          opt.value = kb.id;
          opt.textContent = `${kb.name} (${kb.documentCount || 0} 文档)`;
          select.appendChild(opt);
        });
      }
      sel.replaceWith(select);

      if (kbList.length > 0) {
        if (!currentKbID || !kbList.find((kb) => kb.id === currentKbID)) {
          currentKbID = kbList[0].id;
        }
        select.value = currentKbID;
        localStorage.setItem("ragent_kb_id", currentKbID);
        $("kbInfo").textContent = `当前 KB ID: ${currentKbID}`;
        select.addEventListener("change", () => {
          currentKbID = select.value;
          localStorage.setItem("ragent_kb_id", currentKbID);
          $("kbInfo").textContent = `当前 KB ID: ${currentKbID}`;
          loadDocs();
        });
        loadDocs();
      } else {
        $("kbInfo").textContent = "";
        $("docsTbody").innerHTML = `<tr><td colspan="5" class="muted">请先创建知识库</td></tr>`;
      }
    }

    async function createKB() {
      $("kbErr").textContent = "";
      const name = $("newKbName").value.trim();
      if (!name) { $("kbErr").textContent = "请输入知识库名"; return; }
      try {
        await apiPost("/knowledge-base", { name });
        $("newKbName").value = "";
        await loadKBs();
      } catch (e) {
        $("kbErr").textContent = e.message;
      }
    }
    $("createKbBtn").addEventListener("click", createKB);

    async function loadDocs() {
      if (!currentKbID) return;
      try {
        const data = await apiGet(`/knowledge-base/${currentKbID}/docs`, { pageNo: 1, pageSize: 50 });
        const records = data.records || [];
        const tbody = $("docsTbody");
        if (records.length === 0) {
          tbody.innerHTML = `<tr><td colspan="5" class="muted">还没有文档</td></tr>`;
          return;
        }
        tbody.innerHTML = records.map((d) => `
          <tr>
            <td>${escape(d.docName)}</td>
            <td>${statusLabel(d.status)}</td>
            <td>${d.chunkCount ?? 0}</td>
            <td>${fmtSize(d.fileSize)}</td>
            <td class="muted">${fmtTime(d.updateTime)}</td>
          </tr>
        `).join("");
      } catch (e) {
        $("docsTbody").innerHTML = `<tr><td colspan="5" class="error">${escape(e.message)}</td></tr>`;
      }
    }
    $("refreshDocsBtn").addEventListener("click", loadDocs);

    async function uploadDoc() {
      $("uploadErr").textContent = "";
      if (!currentKbID) { $("uploadErr").textContent = "请先选择知识库"; return; }
      const file = $("fileInput").files[0];
      if (!file) { $("uploadErr").textContent = "请选择文件"; return; }
      const fd = new FormData();
      fd.append("file", file);
      fd.append("sourceType", "file");
      $("uploadBtn").disabled = true;
      try {
        await apiUpload(`/knowledge-base/${currentKbID}/docs/upload`, fd);
        $("fileInput").value = "";
        await loadDocs();
      } catch (e) {
        $("uploadErr").textContent = e.message;
      } finally {
        $("uploadBtn").disabled = false;
      }
    }
    $("uploadBtn").addEventListener("click", uploadDoc);

    function statusLabel(s) {
      const m = {
        "pending": "待处理",
        "chunking": "切分中",
        "embedding": "embedding 中",
        "ready": '<span class="ok">已就绪</span>',
        "failed": '<span class="error">失败</span>',
      };
      return m[s] || s || "-";
    }
    function fmtSize(n) {
      if (!n) return "-";
      if (n < 1024) return n + " B";
      if (n < 1024 * 1024) return (n / 1024).toFixed(1) + " KB";
      return (n / 1024 / 1024).toFixed(2) + " MB";
    }
    function fmtTime(s) {
      if (!s) return "-";
      try { return new Date(s).toLocaleString(); } catch { return s; }
    }
    function escape(s) {
      return String(s ?? "").replace(/[<>&"]/g, (c) => ({ "<": "&lt;", ">": "&gt;", "&": "&amp;", '"': "&quot;" }[c]));
    }

    loadKBs().catch((e) => { $("kbErr").textContent = e.message; });
  </script>
</body>
</html>
