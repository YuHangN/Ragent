server:
  port: 9090
  base-path: /api/ragent

db:
  dsn: ""  # 通过环境变量 RAGENT_DB_DSN 注入
  max-open-conns: 10
  max-idle-conns: 5
  conn-max-lifetime: 1800

redis:
  addr: "127.0.0.1:6379"
  password: ""  # 通过环境变量 RAGENT_REDIS_PASSWORD 注入
  db: 0

milvus:
  uri: "http://localhost:19530"

rustfs:
  endpoint: "localhost:9000"
  access-key: ""  # 通过环境变量 RAGENT_RUSTFS_ACCESS_KEY 注入
  secret-key: ""  # 通过环境变量 RAGENT_RUSTFS_SECRET_KEY 注入
  bucket: "ragent"
  use-ssl: false

app:
  demo-mode: false
  jwt-secret: "ragent-secret-change-in-production"
  jwt-expire-hours: 72